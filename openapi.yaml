openapi: 3.0.3
info:
  title: MyGoLangApp API
  version: "1.0.0"
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  parameters:
    sort:
      name: sort
      in: query
      description: >
        Comma-separated sort fields. Common patterns:
        `-created_at` (prefix `-` = desc)
        `amount` (no prefix `-` = asc)
      required: false
      schema:
        type: string
        example: "-created_at"

  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: "Unauthenticated: missing or invalid token"
      required:
        - code
        - message
    
    User:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        token:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          example: "1"
        merchant:
          type: string
          example: "Merchant A"
        status:
          type: string
          example: "completed , processing , or failed"
        amount:
          type: string
          example: "alice@example.com"
        created_at:
          type: string
          format: date-time

  responses:
    LoginResponse:
      description: return token and user information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/User'
    PaymentListResponse:
      description: Payment List
      content:
        application/json:
          schema:
            type: object
            properties:
              payments:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
              total:
                type: integer
                example: 50
              total_completed:
                type: integer
                example: 40
              total_processing:
                type: integer
                example: 7
              total_failed:
                type: integer
                example: 3
              page:
                type: integer
                example: 1
              limit:
                type: integer
                example: 10
    UnauthorizedError:
      description: Authentication failed or missing credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthenticated:
              summary: Missing or invalid token
              value:
                code: 401
                message: "Unauthenticated: missing or invalid token"

paths:
  /dashboard/v1/auth/login:
    post:
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          $ref: '#/components/responses/LoginResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedError'

  /dashboard/v1/payments:
    get:
      summary: List of payments
      parameters:
        - $ref: '#/components/parameters/sort'
        - in: query
          name: status
          schema:
            type: string
          description: status of payment (completed , processing , or failed)
        - in: query
          name: id
          schema:
            type: string
          description: payment id
        - in: query
          name: merchant
          schema:
            type: string
          description: merchant name (case-insensitive sub-match)
        - in: query
          name: start_date
          schema:
            type: string
          description: filter payments created on or after this date (RFC3339)
        - in: query
          name: end_date
          schema:
            type: string
          description: filter payments created on or before this date (RFC3339)
        - in: query
          name: min_amount
          schema:
            type: string
          description: filter payments with amount greater than or equal to this value
        - in: query
          name: max_amount
          schema:
            type: string
          description: filter payments with amount less than or equal to this value
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: page number for database offset
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: limit of records to retrieve per page
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: '#/components/responses/PaymentListResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedError'

